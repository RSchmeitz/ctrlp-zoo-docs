<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="508" viewBox="0 0 1280 508" role="img" aria-label="CTRL-P repository layout overview">
  <defs>
    <linearGradient id="layout-bg-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f3fb"/>
      <stop offset="100%" stop-color="#eef9f6"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="508" rx="30" fill="url(#layout-bg-light)"/>
  <rect x="26" y="26" width="1228" height="456" rx="26" fill="#ffffff" stroke="#ddd3e7" stroke-width="1.5"/>
  <rect x="70" y="50" width="181" height="31" rx="15.5" fill="#f1e8fa" stroke="#c9b0df" stroke-width="1"/>
  <text x="160.5" y="71" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#7a43a8">PROJECT LAYOUT</text>
  <text x="70" y="114" font-family="DejaVu Sans, Arial, sans-serif" font-size="34" font-weight="700" fill="#42295b">Keep code, inputs, outputs, and data separate</text>
  <text x="70" y="144" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" fill="#5f5668">This split keeps experiments editable, generated files disposable, and shared</text>
  <text x="70" y="168" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" fill="#5f5668">assets reusable.</text>
  <rect x="62" y="194" width="270" height="236" rx="24" fill="#f3edf8" stroke="#c9b0df" stroke-width="2"/>
  <rect x="62" y="194" width="270" height="8" rx="24" fill="#a978d6" opacity="0.95"/>
  <rect x="90" y="222" width="106" height="31" rx="15.5" fill="#f8f1fd" stroke="#c9b0df" stroke-width="1"/>
  <text x="143" y="243" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#7a43a8">CODEBASE</text>
  <text x="90" y="288" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#42295b">src/ctrlp</text>
  <text x="90" y="324" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#5f5668">Framework package.</text>
  <text x="90" y="345" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#5f5668">Core modules:</text>
  <text x="90" y="366" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#5f5668">environments, manager,</text>
  <text x="90" y="387" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#5f5668">learning, simulation,</text>
  <text x="90" y="408" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#5f5668">common.</text>
  <rect x="352" y="194" width="270" height="236" rx="24" fill="#f8fbfc" stroke="#d7e3ea" stroke-width="2"/>
  <rect x="352" y="194" width="270" height="8" rx="24" fill="#0f4c5c" opacity="0.92"/>
  <rect x="380" y="222" width="82" height="31" rx="15.5" fill="#ffffff" stroke="#d7e3ea" stroke-width="1"/>
  <text x="421" y="243" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f4c5c">INPUTS</text>
  <text x="380" y="282" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f4c5c">experiments/</text>
  <text x="380" y="310" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f4c5c">&lt;env&gt;/&lt;task&gt;</text>
  <text x="380" y="340" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#4c6670">Editable config pieces</text>
  <text x="380" y="361" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#4c6670">and runnable shortcuts.</text>
  <text x="380" y="382" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#4c6670">Inputs include environment.yml,</text>
  <text x="380" y="403" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#4c6670">procgen/&lt;name&gt;.yml, and config/</text>
  <text x="380" y="424" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#4c6670">&lt;algo&gt;/&lt;run&gt;.yml.</text>
  <rect x="642" y="194" width="270" height="236" rx="24" fill="#edf7f1" stroke="#8cc3a0" stroke-width="2"/>
  <rect x="642" y="194" width="270" height="8" rx="24" fill="#59d0b5" opacity="0.95"/>
  <rect x="670" y="222" width="97" height="31" rx="15.5" fill="#f4fbf8" stroke="#8cc3a0" stroke-width="1"/>
  <text x="718.5" y="243" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#1e6b3a">OUTPUTS</text>
  <text x="670" y="282" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#195c31">experiments/</text>
  <text x="670" y="310" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#195c31">runs</text>
  <text x="670" y="340" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#40614c">Generated outputs.</text>
  <text x="670" y="361" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#40614c">Parameters, checkpoints,</text>
  <text x="670" y="382" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#40614c">eval files, and HPO</text>
  <text x="670" y="403" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#40614c">artifacts live here.</text>
  <rect x="932" y="194" width="270" height="236" rx="24" fill="#fff5e8" stroke="#e6b26a" stroke-width="2"/>
  <rect x="932" y="194" width="270" height="8" rx="24" fill="#f0d17a" opacity="0.95"/>
  <rect x="960" y="222" width="130" height="31" rx="15.5" fill="#fffaf0" stroke="#e6b26a" stroke-width="1"/>
  <text x="1025" y="243" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#8c5a15">SHARED DATA</text>
  <text x="960" y="288" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#8c5a15">data</text>
  <text x="960" y="324" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#6b5335">Reusable assets.</text>
  <text x="960" y="345" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#6b5335">datasets/ and procgen/</text>
  <text x="960" y="366" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#6b5335">are shared across</text>
  <text x="960" y="387" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#6b5335">workflows.</text>
</svg>
