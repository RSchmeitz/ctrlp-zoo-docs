  <text x="76" y="114" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="34" font-weight="700" fill="#F0E4FB">How the main pieces interact</text>
  <text x="76" y="144" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" fill="#b8b1c1">The manager coordinates one run, the agent owns learning, and the environment provides the</text>
