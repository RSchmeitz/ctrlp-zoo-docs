  <text x="90" y="288" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#F0E4FB">src/ctrlp</text>
  <text x="90" y="324" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#D1C7DA">Framework package.</text>
  <text x="90" y="345" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#D1C7DA">Core modules:</text>
