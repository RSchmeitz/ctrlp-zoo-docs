  <text x="380" y="288" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#F5F1F8">experiments/&lt;env&gt;/&lt;task&gt;</text>
  <text x="380" y="324" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#CFC8D6">Editable config pieces and</text>
  <text x="380" y="345" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#CFC8D6">runnable shortcuts.</text>
  <text x="380" y="366" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#CFC8D6">Inputs include environment.yml,</text>
  <text x="380" y="387" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#CFC8D6">procgen/&lt;name&gt;.yml, and</text>
  <text x="380" y="408" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#CFC8D6">config/&lt;algo&gt;/&lt;run&gt;.yml.</text>
  <text x="380" y="429" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#CFC8D6">&lt;algo&gt;/&lt;variant&gt;.yml lives here too.</text>
