  <text x="70" y="114" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="34" font-weight="700" fill="#F0E4FB">Keep code, inputs, outputs, and data separate</text>
  <text x="70" y="144" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" fill="#b8b1c1">This split keeps experiments editable, generated files disposable, and shared</text>
  <text x="70" y="168" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" fill="#b8b1c1">assets reusable.</text>
