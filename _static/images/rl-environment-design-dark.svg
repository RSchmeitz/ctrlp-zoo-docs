<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-label="RL environment design dimensions">
  <defs>
    <linearGradient id="env-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09080d"/>
      <stop offset="100%" stop-color="#15111d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="540" rx="28" fill="url(#env-bg)"/>
  <text x="80" y="54" font-family="DejaVu Sans, Arial, sans-serif" font-size="34" font-weight="700" fill="#f0e4fb">Environment design in RL</text>
  <rect x="90" y="100" width="1020" height="360" rx="28" fill="#121019" stroke="#2b2438" stroke-width="2"/>
  <rect x="130" y="150" width="190" height="134" rx="24" fill="#171320" stroke="#4b3b61" stroke-width="2"/>
  <rect x="360" y="150" width="190" height="134" rx="24" fill="#121a19" stroke="#2f7164" stroke-width="2"/>
  <rect x="590" y="150" width="190" height="134" rx="24" fill="#1a1610" stroke="#8f6b32" stroke-width="2"/>
  <rect x="820" y="150" width="190" height="134" rx="24" fill="#17151b" stroke="#615768" stroke-width="2"/>
  <text x="160" y="192" font-family="DejaVu Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#f0e4fb">Observation</text>
  <text x="160" y="225" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#d1c7da">What the agent can</text>
  <text x="160" y="247" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#d1c7da">see</text>
  <text x="390" y="192" font-family="DejaVu Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#ddfbf3">Action</text>
  <text x="390" y="225" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#c1e7df">What the agent can</text>
  <text x="390" y="247" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#c1e7df">change</text>
  <text x="620" y="192" font-family="DejaVu Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#fff3cc">Reward</text>
  <text x="620" y="221" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#e3d2b2">What the agent</text>
  <text x="620" y="242" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#e3d2b2">should</text>
  <text x="620" y="263" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#e3d2b2">optimize</text>
  <text x="850" y="192" font-family="DejaVu Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#f5f1f8">Horizon</text>
  <text x="850" y="225" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#cfc8d6">When the episode</text>
  <text x="850" y="247" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#cfc8d6">ends</text>
  <rect x="220" y="330" width="760" height="94" rx="24" fill="#17151b" stroke="#615768" stroke-width="2"/>
  <text x="250" y="365" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#f5f1f8">Good environments keep the task story coherent</text>
  <text x="250" y="395" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" fill="#cfc8d6">The agent should see enough, act meaningfully, receive aligned rewards,</text>
  <text x="250" y="419" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" fill="#cfc8d6">and face a horizon that matches the real control problem.</text>
</svg>