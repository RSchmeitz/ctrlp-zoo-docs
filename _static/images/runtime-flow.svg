<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="432" viewBox="0 0 1280 432" role="img" aria-label="CTRL-P runtime flow">
  <defs>
    <linearGradient id="flow-bg-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f3fb"/>
      <stop offset="100%" stop-color="#eef9f6"/>
    </linearGradient>
    <marker id="flow-arrow-light" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 z" fill="context-stroke"/>
    </marker>
  </defs>
  <rect width="1280" height="432" rx="30" fill="url(#flow-bg-light)"/>
  <rect x="26" y="26" width="1228" height="380" rx="26" fill="#ffffff" stroke="#ddd3e7" stroke-width="1.5"/>
  <rect x="72" y="50" width="168" height="31" rx="15.5" fill="#f1e8fa" stroke="#c9b0df" stroke-width="1"/>
  <text x="156" y="71" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#7a43a8">EXPERIMENT FLOW</text>
  <text x="72" y="114" font-family="DejaVu Sans, Arial, sans-serif" font-size="34" font-weight="700" fill="#42295b">CTRL-P runtime flow</text>
  <text x="72" y="144" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" fill="#5f5668">Inspect configuration first, validate once, and only then run a task that writes</text>
  <text x="72" y="168" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" fill="#5f5668">outputs.</text>

  <rect x="72" y="186" width="256" height="215" rx="24" fill="#f3edf8" stroke="#c9b0df" stroke-width="2"/>
  <rect x="72" y="186" width="256" height="8" rx="24" fill="#a978d6" opacity="0.95"/>
  <rect x="100" y="214" width="106" height="31" rx="15.5" fill="#f8f1fd" stroke="#c9b0df" stroke-width="1"/>
  <text x="153" y="235" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#7a43a8">01 CONFIG</text>
  <text x="100" y="282" font-family="DejaVu Sans, Arial, sans-serif" font-size="26" font-weight="700" fill="#42295b">Start from config</text>
  <text x="100" y="319" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#5f5668">Load the root YAML</text>
  <text x="100" y="341" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#5f5668">and the chosen</text>
  <text x="100" y="363" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#5f5668">environment and</text>
  <text x="100" y="385" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#5f5668">algorithm defaults.</text>

  <rect x="360" y="186" width="256" height="193" rx="24" fill="#f3edf8" stroke="#c9b0df" stroke-width="2"/>
  <rect x="360" y="186" width="256" height="8" rx="24" fill="#a978d6" opacity="0.95"/>
  <rect x="388" y="214" width="115" height="31" rx="15.5" fill="#f8f1fd" stroke="#c9b0df" stroke-width="1"/>
  <text x="445.5" y="235" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#7a43a8">02 RESOLVE</text>
  <text x="388" y="282" font-family="DejaVu Sans, Arial, sans-serif" font-size="26" font-weight="700" fill="#42295b">Resolve inputs</text>
  <text x="388" y="319" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#5f5668">Apply selectors, merge</text>
  <text x="388" y="341" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#5f5668">overrides, and decide</text>
  <text x="388" y="363" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#5f5668">output locations.</text>

  <rect x="648" y="186" width="256" height="215" rx="24" fill="#f8fbfc" stroke="#d7e3ea" stroke-width="2"/>
  <rect x="648" y="186" width="256" height="8" rx="24" fill="#0f4c5c" opacity="0.92"/>
  <rect x="676" y="214" width="100" height="31" rx="15.5" fill="#ffffff" stroke="#d7e3ea" stroke-width="1"/>
  <text x="726" y="235" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f4c5c">03 CHECK</text>
  <text x="676" y="282" font-family="DejaVu Sans, Arial, sans-serif" font-size="26" font-weight="700" fill="#0f4c5c">Run checks</text>
  <text x="676" y="319" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#4c6670">Bootstrap one</text>
  <text x="676" y="341" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#4c6670">environment and one</text>
  <text x="676" y="363" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#4c6670">model before doing</text>
  <text x="676" y="385" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#4c6670">expensive work.</text>

  <rect x="936" y="186" width="272" height="193" rx="24" fill="#edf7f1" stroke="#8cc3a0" stroke-width="2"/>
  <rect x="936" y="186" width="272" height="8" rx="24" fill="#59d0b5" opacity="0.95"/>
  <rect x="964" y="214" width="116" height="31" rx="15.5" fill="#f4fbf8" stroke="#8cc3a0" stroke-width="1"/>
  <text x="1022" y="235" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#1e6b3a">04 EXECUTE</text>
  <text x="964" y="282" font-family="DejaVu Sans, Arial, sans-serif" font-size="26" font-weight="700" fill="#195c31">Execute task</text>
  <text x="964" y="319" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#40614c">Train, eval, demo,</text>
  <text x="964" y="341" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#40614c">rollout, pretrain, or HPO</text>
  <text x="964" y="363" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#40614c">using the resolved setup.</text>

  <path d="M328 274 L360 274" stroke="#59d0b5" stroke-width="3.5" stroke-linecap="round" fill="none" marker-end="url(#flow-arrow-light)"/>
  <rect x="318" y="242" width="71" height="26" rx="13" fill="#f4fbf8" stroke="#8cc3a0" stroke-width="1"/>
  <text x="353.5" y="260" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" font-weight="700" fill="#1e6b3a">MERGE</text>
  <path d="M616 274 L648 274" stroke="#59d0b5" stroke-width="3.5" stroke-linecap="round" fill="none" marker-end="url(#flow-arrow-light)"/>
  <rect x="606" y="242" width="106" height="26" rx="13" fill="#f4fbf8" stroke="#8cc3a0" stroke-width="1"/>
  <text x="659" y="260" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" font-weight="700" fill="#1e6b3a">BOOTSTRAP</text>
  <path d="M904 274 L936 274" stroke="#59d0b5" stroke-width="3.5" stroke-linecap="round" fill="none" marker-end="url(#flow-arrow-light)"/>
  <rect x="894" y="242" width="53" height="26" rx="13" fill="#f4fbf8" stroke="#8cc3a0" stroke-width="1"/>
  <text x="920.5" y="260" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" font-weight="700" fill="#1e6b3a">RUN</text>
  <rect x="995" y="366" width="139" height="31" rx="15.5" fill="#f4fbf8" stroke="#8cc3a0" stroke-width="1"/>
  <text x="1064.5" y="387" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#1e6b3a">LAZY OUTPUTS</text>
  <text x="1064" y="418" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#40614c">Files appear only for tasks that need them.</text>
</svg>
