  <text x="177.5" y="71" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#CFA6F1">ENVIRONMENT PATHS</text>
  <text x="84" y="114" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="34" font-weight="700" fill="#F0E4FB">Built-in and Gym environments</text>
  <text x="84" y="144" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" fill="#b8b1c1">Both paths use the same runtime, but they do not get defaults from the same place.</text>
  <rect x="76" y="176" width="296" height="283" rx="24" fill="#171320" stroke="#4B3B61" stroke-width="2" filter="url(#adapter-shadow)"/>
  <rect x="76" y="176" width="296" height="8" rx="24" fill="#A978D6" opacity="0.95"/>
  <rect x="104" y="204" width="81" height="31" rx="15.5" fill="#251C33" stroke="#4B3B61" stroke-width="1"/>
  <text x="144.5" y="225" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#A978D6">NATIVE</text>
  <text x="104" y="274" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#F0E4FB">Built-in CTRL-P env</text>
  <text x="104" y="311" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#D1C7DA">Example: thermogrid.</text>
  <text x="104" y="333" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#D1C7DA">Loads packaged defaults</text>
  <text x="104" y="355" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#D1C7DA">from</text>
  <text x="104" y="377" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#D1C7DA">src/ctrlp/environments/&lt;env&gt;/defaults/.</text>
  <text x="104" y="399" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#D1C7DA">Optional ProcGen support</text>
  <text x="104" y="421" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#D1C7DA">stays inside the built-in</text>
  <text x="104" y="443" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#D1C7DA">path.</text>
  <rect x="402" y="176" width="296" height="246" rx="24" fill="#121A19" stroke="#2F7164" stroke-width="2" filter="url(#adapter-shadow)"/>
  <rect x="402" y="176" width="296" height="8" rx="24" fill="#7DE5CF" opacity="0.95"/>
  <rect x="430" y="204" width="143" height="31" rx="15.5" fill="#11302B" stroke="#2F7164" stroke-width="1"/>
  <text x="501.5" y="225" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#7DE5CF">COMMON FLOW</text>
  <text x="430" y="274" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#DDFBF3">Shared runtime</text>
  <text x="430" y="311" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#C1E7DF">resolve -&gt; check -&gt; train,</text>
  <text x="430" y="333" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#C1E7DF">eval, or demo.</text>
  <text x="430" y="355" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#C1E7DF">Normalizes optional info</text>
  <text x="430" y="377" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#C1E7DF">fields and writes runs or</text>
  <text x="430" y="399" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#C1E7DF">datasets lazily.</text>
  <rect x="728" y="176" width="296" height="246" rx="24" fill="#1A1610" stroke="#8F6B32" stroke-width="2" filter="url(#adapter-shadow)"/>
  <rect x="728" y="176" width="296" height="8" rx="24" fill="#F0D17A" opacity="0.95"/>
  <rect x="756" y="204" width="103" height="31" rx="15.5" fill="#2A2114" stroke="#8F6B32" stroke-width="1"/>
  <text x="807.5" y="225" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#F0D17A">FALLBACK</text>
  <text x="756" y="274" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#FFF3CC">Gym fallback env</text>
  <text x="756" y="311" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#E3D2B2">Example: CartPole-v1.</text>
  <text x="756" y="333" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#E3D2B2">Builds the env with</text>
  <text x="756" y="355" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#E3D2B2">gymnasium.make(env_id).</text>
  <text x="756" y="377" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#E3D2B2">Bootstraps editable configs</text>
  <text x="756" y="399" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" fill="#E3D2B2">on the first executable run.</text>
  <rect x="302" y="438" width="496" height="165" rx="24" fill="#17151B" stroke="#615768" stroke-width="2" filter="url(#adapter-shadow)"/>
  <rect x="302" y="438" width="496" height="8" rx="24" fill="#F5F1F8" opacity="0.95"/>
  <rect x="330" y="466" width="106" height="31" rx="15.5" fill="#241F2B" stroke="#615768" stroke-width="1"/>
  <text x="383.0" y="487" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#F5F1F8">ARTIFACTS</text>
  <text x="330" y="530" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#F5F1F8">Outputs and bootstrapped files</text>
  <text x="330" y="566" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#CFC8D6">experiments/&lt;env&gt;/&lt;task&gt;/, task-local runs/, and data/</text>
  <text x="330" y="587" text-anchor="start" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#CFC8D6">appear when a task needs them.</text>
